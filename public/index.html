<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memikoza - Centrum Memowe</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { background-color: black; color: white; margin: 0; padding: 0; overflow: hidden; }
        .tyt { color: white; }
        .loader { text-align: center; padding: 20px; font-family: monospace; }
    </style>
</head>
<body>

<div id="app-wrapper">

    <div class="fab-container">
      <button id="fab-main" class="fab-main circle-button">Pokaż</button>
      <div id="fab-actions" class="fab-actions">
        <button class="fab-action circle-button btn1" onclick="openPage('Jbzd', this)">Jbzd</button>
        <button class="fab-action circle-button btn2" onclick="openPage('Jm', this)">Joe<br>Monster</button>
        <button class="fab-action circle-button btn3" onclick="openPage('Demo', this)">Demotywatory</button>
        <button class="fab-action circle-button btn4" onclick="openPage('Kwjk', this)">Kwejk</button>
        <button class="fab-action circle-button btn5" onclick="openPage('Redmik', this)">Redmik</button>
        <button class="fab-action circle-button btn6" onclick="openPage('Atom', this)">Atomowe<br>Grabie</button>
        <button class="fab-action circle-button btn-rotate" onclick="rotatePage()">↻</button>
        <button class="fab-action circle-button btn-scale" onclick="toggleScalingPanel()">&lt;---&gt;</button><button class="fab-action circle-button btn-autoscroll" id="autoscroll-btn" onclick="toggleAutoScroll()">▶</button>
      </div>
    </div>

    <div id="scaling-panel" class="scaling-panel">
      <div class="scaling-header">Skaluj Wielkość Memów</div>
      <input type="range" id="page-scale-slider" min="0.25" max="3.0" step="0.01" value="1">
    </div>

    <div class="container" id="scroll-container">
        <div class="content" id="meme-content">
            <div id="loadingMessage" class="loader">Ładowanie memów z bazy...</div>

            <div id="Jbzd" class="tabcontent" style="display: none;"></div>
            <div id="Jm" class="tabcontent" style="display: none;"></div>
            <div id="Demo" class="tabcontent" style="display: none;"></div>
            <div id="Kwjk" class="tabcontent" style="display: none;"></div>
            <div id="Redmik" class="tabcontent" style="display: none;"></div>
            <div id="Atom" class="tabcontent" style="display: none;"></div>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
